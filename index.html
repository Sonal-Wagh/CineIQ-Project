<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CineIQ 🎬</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #ffffff;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { font-size: 2.5rem; color: #5DCAA5; margin-bottom: 8px; }
    .caption { color: #aaa; margin-bottom: 40px; }

    .search-box {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }
    input {
      flex: 1;
      padding: 14px 18px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #1a1a2e;
      color: #fff;
      font-size: 1rem;
    }
    input:focus { outline: none; border-color: #5DCAA5; }

    .controls {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }
    .control-group { display: flex; flex-direction: column; gap: 6px; }
    label { font-size: 0.85rem; color: #aaa; }
    input[type="range"] { width: 160px; accent-color: #5DCAA5; }
    input[type="number"] { width: 100px; padding: 8px 12px; }

    button {
      padding: 14px 32px;
      background: #5DCAA5;
      color: #0f0f1a;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #4ab893; }
    button:disabled { background: #333; color: #666; cursor: not-allowed; }

    .spinner {
      display: none;
      text-align: center;
      padding: 40px;
      color: #5DCAA5;
      font-size: 1.1rem;
    }

    .error {
      background: #2a1a1a;
      border: 1px solid #cc4444;
      border-radius: 10px;
      padding: 16px;
      color: #ff6b6b;
      margin-bottom: 20px;
      display: none;
    }

    .results-title {
      font-size: 1.3rem;
      margin-bottom: 20px;
      color: #5DCAA5;
      display: none;
    }

    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: #5DCAA5; }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .card-title { font-size: 1.1rem; font-weight: bold; }
    .card-score {
      background: #5DCAA5;
      color: #0f0f1a;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: bold;
    }

    .metrics {
      display: flex;
      gap: 20px;
      margin-bottom: 12px;
    }
    .metric {
      background: #0f0f1a;
      border-radius: 8px;
      padding: 10px 16px;
      text-align: center;
      flex: 1;
    }
    .metric-value { font-size: 1.2rem; font-weight: bold; color: #5DCAA5; }
    .metric-label { font-size: 0.75rem; color: #aaa; margin-top: 2px; }

    .genres {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }
    .genre-tag {
      background: #2a2a4a;
      color: #7F77DD;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.8rem;
    }

    .explanation {
      font-size: 0.9rem;
      color: #aaa;
      font-style: italic;
      border-left: 3px solid #5DCAA5;
      padding-left: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>CineIQ 🎬</h1>
    <p class="caption">Explainable hybrid movie recommendations</p>

    <div class="search-box">
      <input type="text" id="movieInput" placeholder="Enter a movie you like..." value="The Dark Knight"/>
      <button id="searchBtn" onclick="getRecommendations()">Get Recommendations</button>
    </div>

    <div class="controls">
      <div class="control-group">
        <label>User ID</label>
        <input type="number" id="userId" value="1" min="1" max="162000"/>
      </div>
      <div class="control-group">
        <label>SVD Weight: <span id="alphaVal">0.5</span></label>
        <input type="range" id="alpha" min="0" max="1" step="0.05" value="0.5"
          oninput="document.getElementById('alphaVal').textContent = this.value"/>
      </div>
      <div class="control-group">
        <label>Recommendations: <span id="nVal">10</span></label>
        <input type="range" id="nRecs" min="5" max="20" step="1" value="10"
          oninput="document.getElementById('nVal').textContent = this.value"/>
      </div>
    </div>

    <div class="error" id="errorBox"></div>
    <div class="spinner" id="spinner">🎬 Finding recommendations...</div>
    <div class="results-title" id="resultsTitle"></div>
    <div id="results"></div>
  </div>

  <script>
    const API_URL = "https://cineiq-project-1.onrender.com/docs";

    async function getRecommendations() {
      const seed   = document.getElementById("movieInput").value.trim();
      const userId = parseInt(document.getElementById("userId").value);
      const alpha  = parseFloat(document.getElementById("alpha").value);
      const n      = parseInt(document.getElementById("nRecs").value);

      if (!seed) return;
      
      document.getElementById("errorBox").style.display   = "none";
      document.getElementById("results").innerHTML        = "";
      document.getElementById("resultsTitle").style.display = "none";
      document.getElementById("spinner").style.display    = "block";
      document.getElementById("searchBtn").disabled       = true;

      try {
        const res = await fetch(`${API_URL}/recommend`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ seed_title: seed, user_id: userId, n, alpha })
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || "Movie not found. Check spelling.");
        }

        const data = await res.json();
        renderResults(data, seed, n);

      } catch (err) {
        const box = document.getElementById("errorBox");
        box.textContent = err.message;
        box.style.display = "block";
      } finally {
        document.getElementById("spinner").style.display = "none";
        document.getElementById("searchBtn").disabled   = false;
      }
    }

    function renderResults(data, seed, n) {
      const title = document.getElementById("resultsTitle");
      title.textContent = `Top ${n} picks for "${seed}"`;
      title.style.display = "block";

      const container = document.getElementById("results");
      container.innerHTML = data.map(movie => `
        <div class="card">
          <div class="card-header">
            <div class="card-title">${movie.rank}. ${movie.title}</div>
            <div class="card-score">Score: ${movie.final_score.toFixed(3)}</div>
          </div>
          <div class="metrics">
            <div class="metric">
              <div class="metric-value">${movie.content_score.toFixed(2)}</div>
              <div class="metric-label">Content</div>
            </div>
            <div class="metric">
              <div class="metric-value">${movie.svd_score.toFixed(2)}</div>
              <div class="metric-label">SVD</div>
            </div>
            <div class="metric">
              <div class="metric-value">${movie.sentiment.toFixed(2)}</div>
              <div class="metric-label">Sentiment</div>
            </div>
          </div>
          <div class="genres">
            ${movie.genres.map(g => `<span class="genre-tag">${g}</span>`).join("")}
          </div>
          <div class="explanation">${movie.explanation}</div>
        </div>
      `).join("");
    }
    document.getElementById("movieInput")
      .addEventListener("keypress", e => { if (e.key === "Enter") getRecommendations(); });
  </script>
</body>
</html>
